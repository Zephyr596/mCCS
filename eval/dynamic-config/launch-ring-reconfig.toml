name = "setup4-dynamic"
group = "setup4-dynamic"
[[worker]]
host = "host1"
bin = "mccs"
args = "--host 1 --config eval/dynamic-config/my_reconfig.toml"
weak = true
dependencies = []

[[worker]]
host = "host2"
bin = "mccs"
args = "--host 2 --config eval/dynamic-config/my_reconfig.toml"
weak = true
dependencies = []

